name: client_documents_check
app: ICE
description: "Check document status for a specific client"
params:
  client_id: { type: string, example: "900005" }
steps:
  - { navigate: { page: Client Search, via: sidebar } }
  - { enter: { field: search, value: "{client_id}" } }
  - { action: search }
  - { click: { element: "{client_id}", type: option, context: results grid } }
  - { click: { element: "Documents", type: tab } }
  - { verify: { visible: "Documents" } }
tags: [client, documents, verification]
